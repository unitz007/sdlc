    <script>(function(){document.getElementById("article-tutorial").innerHTML="<h1>Building a Software Development Lifecycle Tool: A Deep Dive into Process Management and Configuration<\/h1>\n\n<p class=\"intro\">This tutorial explores a complete CLI tool that automates software development lifecycle (SDLC) operations across different project types. You'll learn fundamental concepts of process management, configuration handling, project detection, and CLI architecture through the lens of a working Go application. The project demonstrates how to build robust command execution frameworks, manage configurations across environments, and create extensible architectures for development tools.<\/p>\n\n<h2>Project Overview & Problem Statement<\/h2>\n\n<p>The <code>unitz007/sdlc<\/code> project addresses a common challenge in software development: the inconsistency of development commands across different project types and environments. Developers often struggle with remembering project-specific commands (like <code>npm run test<\/code> for Node.js vs <code>go test<\/code> for Go), managing configuration across environments, and ensuring graceful handling of long-running processes.<\/p>\n\n<p>This tool creates a unified interface for development lifecycle operations by:<\/p>\n\n<ul>\n<li>Automatically detecting project types based on build files (go.mod, package.json, etc.)<\/li>\n<li>Providing consistent commands (run, test, build, install, clean) regardless of underlying technology<\/li>\n<li>Managing environment-specific configurations<\/li>\n<li>Streaming process output and handling OS signals gracefully<\/li>\n<\/ul>\n\n<h2>Architecture<\/h2>\n\n<ul>\n<li><strong>Configuration Layer (config/)<\/strong> — Environment-specific settings and configuration file handling, embodying the principle of separation of configuration from code<\/li>\n<li><strong>Core Engine (engine/)<\/strong> — Project detection and classification, demonstrating filesystem traversal and pattern matching<\/li>\n<li><strong>Task Abstraction (lib/task.go)<\/strong> — Technology-agnostic command mapping, showcasing interface design and polymorphism<\/li>\n<li><strong>Process Management (lib/executor.go)<\/strong> — Robust command execution with I/O streaming and signal handling, illustrating Unix process management concepts<\/li>\n<li><strong>CLI Framework (cmd/)<\/strong> — Command-line interface using Cobra, demonstrating command pattern implementation<\/li>\n<li><strong>Application Entry (main.go)<\/strong> — Dependency injection and application bootstrapping<\/li>\n<\/ul>\n\n<h2>Configuration Management & Environment Handling<\/h2>\n\n<h3>The Concept<\/h3>\n\n<p>Configuration management is the practice of organizing application settings separately from code logic, allowing the same codebase to operate in different environments (development, staging, production) without modification. This follows the <a href=\"https://12factor.net/config\">Twelve-Factor App methodology<\/a> which treats configuration as environment-specific data that should not be hardcoded.<\/p>\n\n<p>In the context of a CLI tool, configuration management involves reading environment variables and configuration files, providing sensible defaults, and enabling environment-specific overrides. This allows users to customize tool behavior without modifying source code.<\/p>\n\n<h3>The Problem It Solves Here<\/h3>\n\n<p>The SDLC tool needs to handle different environments and user preferences. Users may want different default commands for different projects, custom environment variables for specific workflows, or different behavior based on deployment context. Without proper configuration management, these would require code changes or complex command-line parameter passing.<\/p>\n\n<h3>The Implementation<\/h3>\n\n<p class=\"code-file\">📄 <code>config/config.go:18-27<\/code><\/p>\n\n<pre><code class=\"language-go\">const (\n\tconfigFileName = \".sdlc.json\"\n\tenvConfigName  = \".sdlc.conf\"\n)\n\n// EnvSettings represents the configuration from .sdlc.conf\ntype EnvSettings struct {\n\tEnv  map[string]string\n\tArgs []string\n}<\/code><\/pre>\n\n<p>The configuration system uses a simple struct-based approach with two configuration files. The <code>EnvSettings<\/code> struct demonstrates a key principle: configuration structures should be data-oriented, not behavior-oriented. Notice how it contains environment variables as a map and command arguments as a slice, providing flexibility for arbitrary configuration needs.<\/p>\n\n<p class=\"code-file\">📄 <code>config/config.go:30-42<\/code><\/p>\n\n<pre><code class=\"language-go\">// LoadEnvConfig reads configuration from .sdlc.conf file\nfunc LoadEnvConfig() (<em>EnvSettings, error) {\n\tconfigPath, err := getConfigFile(envConfigName)\n\tif err != nil {\n\t\treturn nil, err\n\t}\n\n\tfile, err := os.Open(configPath)\n\tif err != nil {\n\t\tif os.IsNotExist(err) {\n\t\t\treturn &EnvSettings{Env: make(map[string]string)}, nil\n\t\t}\n\t\treturn nil, err\n\t}\n\tdefer file.Close()\n\n\tsettings := &EnvSettings{\n\t\tEnv:  make(map[string]string),\n\t\tArgs: []string{},\n\t}<\/code><\/pre>\n\n<p>This function demonstrates several important patterns:<\/p>\n\n<p><strong>Graceful degradation:<\/strong> When the config file doesn't exist, it returns an empty settings object rather than failing. This allows the tool to work without configuration while still supporting it when available.<\/p>\n\n<p><strong>Resource management:<\/strong> The <code>defer file.Close()<\/code> ensures the file handle is properly released regardless of execution path.<\/p>\n\n<p><strong>Error propagation:<\/strong> Instead of swallowing errors, they are returned to the caller for handling at an appropriate level in the call stack.<\/p>\n\n<h3>Further Reading<\/h3>\n\n<ul>\n<li><a href=\"https://12factor.net/config\">The Twelve-Factor App: Config<\/a> — Explains the principle of storing configuration in environment variables<\/li>\n<li><a href=\"https://pkg.go.dev/os\">Go os package documentation<\/a> — Covers file operations and environment variable handling<\/li>\n<li><a href=\"https://en.wikipedia.org/wiki/Configuration<em>file\">Configuration file<\/a> — Wikipedia overview of configuration file formats and patterns<\/li>\n<\/ul>\n\n<h2>Process Execution & I/O Management<\/h2>\n\n<h3>The Concept<\/h3>\n\n<p>Process execution in Unix-like systems involves creating child processes, managing their I/O streams, and handling inter-process communication. The <code>os/exec<\/code> package in Go provides a high-level interface for spawning processes, but real-world applications need to handle I/O streaming, signal propagation, and error conditions robustly.<\/p>\n\n<p>I/O streaming is crucial because modern development commands produce output continuously (logs, test results, build progress). Rather than waiting for process completion, streaming allows users to see real-time feedback and provides the ability to interrupt processes gracefully.<\/p>\n\n<h3>The Problem It Solves Here<\/h3>\n\n<p>Development lifecycle commands (tests, builds, servers) often run for extended periods and produce continuous output. Users need to see real-time feedback, interrupt processes with Ctrl+C, and have errors properly captured. Naive process execution might buffer all output until completion, making tools unresponsive for long-running operations.<\/p>\n\n<h3>The Implementation<\/h3>\n\n<p class=\"code-file\">📄 <code>lib/executor.go:13-24<\/code><\/p>\n\n<pre><code class=\"language-go\">// Executor wraps an os/exec.Cmd to run a shell command, stream its combined\n// stdout/stderr output, and handle OS interrupt signals gracefully.\ntype Executor struct {\n\tcmd    <\/em>exec.Cmd\n\tStdout io.Writer\n\tStderr io.Writer\n\tStdin  io.Reader\n}<\/code><\/p>\n\n<p>The <code>Executor<\/code> struct demonstrates dependency injection for I/O streams. By accepting <code>io.Writer<\/code> and <code>io.Reader<\/code> interfaces rather than concrete types, it becomes highly testable and flexible. Different contexts can provide different destinations for output (files, network sockets, in-memory buffers).<\/p>\n\n<p class=\"code-file\">📄 <code>lib/executor.go:26-51<\/code><\/p>\n\n<pre><code class=\"language-go\">// NewExecutor creates a new command executor with the given command and I/O streams\nfunc NewExecutor(command string, stdout io.Writer, stderr io.Writer, stdin io.Reader) <em>Executor {\n\tcmd := exec.Command(\"sh\", \"-c\", command)\n\tcmd.Stdout = stdout\n\tcmd.Stderr = stderr\n\tcmd.Stdin = stdin\n\tcmd.SysProcAttr = &syscall.SysProcAttr{\n\t\tSetpgid: true,\n\t\tPgid:    0,\n\t}\n\n\treturn &Executor{cmd: cmd}\n}\n\n// Run executes the command and waits for completion, streaming output\nfunc (e <\/em>Executor) Run(ctx context.Context) error {\n\tdone := make(chan error, 1)\n\n\tgo func() {\n\t\tdone <- e.cmd.Run()\n\t}()\n\n\tselect {\n\tcase err := <-done:\n\t\treturn err\n\tcase <-ctx.Done():\n\t\tif e.cmd.Process != nil {\n\t\t\te.cmd.Process.Kill()\n\t\t}\n\t\treturn ctx.Err()\n\t}\n}<\/code><\/p>\n\n<p>This implementation showcases several advanced concepts:<\/p>\n\n<p><strong>Process groups:<\/strong> The <code>SysProcAttr.Setpgid = true<\/code> creates a new process group, allowing the parent to terminate all child processes when interrupted. This prevents orphaned processes that continue running after the parent is killed.<\/p>\n\n<p><strong>Context-based cancellation:<\/strong> Using <code>context.Context<\/code> enables proper cancellation propagation. When the context is cancelled (e.g., user presses Ctrl+C), the process is killed and the cancellation error is returned.<\/p>\n\n<p><strong>Non-blocking wait:<\/strong> The goroutine-based approach allows simultaneous monitoring of both process completion and context cancellation, preventing deadlocks.<\/p>\n\n<h3>Further Reading<\/h3>\n\n<ul>\n<li><a href=\"https://pkg.go.dev/os/exec\">Go os/exec package<\/a> — Official documentation for process execution in Go<\/li>\n<li><a href=\"https://en.wikipedia.org/wiki/Process<\/em>group\">Process group<\/a> — Unix process group concepts and signal handling<\/li>\n<li><a href=\"https://pkg.go.dev/context\">Go context package<\/a> — Context propagation and cancellation patterns<\/li>\n<\/ul>\n\n<h2>Project Detection & Filesystem Traversal<\/h2>\n\n<h3>The Concept<\/h3>\n\n<p>Project detection involves traversing the filesystem to identify software projects based on characteristic files or directory structures. This pattern is common in development tools that need to automatically detect project types without explicit user configuration. The detection algorithm walks up the directory tree, looking for well-known files that indicate specific project types.<\/p>\n\n<p>This approach embodies the principle of \"convention over configuration\" — by following established conventions (like <code>go.mod<\/code> for Go projects or <code>package.json<\/code> for Node.js), tools can make intelligent decisions without explicit setup.<\/p>\n\n<h3>The Problem It Solves Here<\/h3>\n\n<p>Users want to run development commands without specifying project type or location. The tool should automatically detect whether it's in a Go project (look for <code>go.mod<\/code>), a Node.js project (look for <code>package.json<\/code>), or other project types, then apply the appropriate command mappings.<\/p>\n\n<h3>The Implementation<\/h3>\n\n<p class=\"code-file\">📄 <code>engine/engine.go:11-21<\/code><\/p>\n\n<pre><code class=\"language-go\">// Project represents a detected project with its location and task definition\ntype Project struct {\n\tName    string   // Name of the build file (e.g. go.mod)\n\tPath    string   // Relative path to the directory containing the build file\n\tAbsPath string   // Absolute path to the directory\n\tTask    lib.Task // The task definition\n}<\/code><\/p>\n\n<p>The <code>Project<\/code> struct captures the essential metadata for a detected project. Notice how it stores both relative and absolute paths — the relative path is useful for display and user interaction, while the absolute path is needed for filesystem operations.<\/p>\n\n<p class=\"code-file\">📄 <code>engine/engine.go:23-45<\/code><\/p>\n\n<pre><code class=\"language-go\">// DetectProjects searches for projects starting from the given directory\nfunc DetectProjects(startDir string) ([]<em>Project, error) {\n\tvar projects []<\/em>Project\n\n\terr := filepath.Walk(startDir, func(path string, info os.FileInfo, err error) error {\n\t\tif err != nil {\n\t\t\treturn err\n\t\t}\n\n\t\t// Skip hidden directories and vendor directories\n\t\tif info.IsDir() {\n\t\t\tbase := filepath.Base(path)\n\t\t\tif strings.HasPrefix(base, \".\") || base == \"vendor\" {\n\t\t\t\treturn filepath.SkipDir\n\t\t\t}\n\t\t}\n\n\t\t// Check for known project files\n\t\tfor <em>, filename := range []string{\"go.mod\", \"package.json\", \"Cargo.toml\"} {\n\t\t\tif info.Name() == filename {\n\t\t\t\tdir := filepath.Dir(path)\n\t\t\t\trelDir, <\/em> := filepath.Rel(startDir, dir)\n\t\t\t\tif relDir == \".\" {\n\t\t\t\t\trelDir = \"\"\n\t\t\t\t}\n\n\t\t\t\ttask, err := lib.GetTaskForFile(filename)\n\t\t\t\tif err != nil {\n\t\t\t\t\treturn err\n\t\t\t\t}\n\n\t\t\t\tproject := &Project{\n\t\t\t\t\tName:    filename,\n\t\t\t\t\tPath:    relDir,\n\t\t\t\t\tAbsPath: dir,\n\t\t\t\t\tTask:    task,\n\t\t\t\t}\n\t\t\t\tprojects = append(projects, project)\n\t\t\t}\n\t\t}\n\n\t\treturn nil\n\t})\n\n\treturn projects, err\n}<\/p>\n\n<p>This detection algorithm demonstrates several important filesystem concepts:<\/p>\n\n<p><strong>Directory traversal with <code>filepath.Walk<\/code>:<\/strong> This function recursively visits all files and directories, allowing comprehensive project detection across entire directory trees.<\/p>\n\n<p><strong>Optimization through skipping:<\/strong> The function returns <code>filepath.SkipDir<\/code> for directories that can't contain projects (hidden directories, vendor directories), preventing unnecessary traversal and improving performance.<\/p>\n\n<p><strong>Cross-platform path handling:<\/strong> Using <code>filepath<\/code> package instead of string manipulation ensures the code works correctly on both Unix and Windows systems.<\/p>\n\n<h3>Further Reading<\/h3>\n\n<ul>\n<li><a href=\"https://pkg.go.dev/path/filepath\">Go filepath package<\/a> — Platform-independent path manipulation<\/li>\n<li><a href=\"https://pkg.go.dev/io/fs\">Go io/fs package<\/a> — Modern filesystem interface introduced in Go 1.16<\/li>\n<li><a href=\"https://en.wikipedia.org/wiki/Walk<em>(file<\/em>system)\">Directory traversal<\/a> — General concepts of recursive filesystem exploration<\/li>\n<\/ul>\n\n<h2>CLI Framework & Command Pattern<\/h2>\n\n<h3>The Concept<\/h3>\n\n<p>The Command Pattern is a behavioral design pattern that turns requests into objects, allowing parameterization of clients with different requests, queuing of requests, and logging of operations. In CLI applications, this pattern manifests as individual commands (like \"run\", \"test\", \"build\") being separate objects that can be composed and configured independently.<\/p>\n\n<p>Modern CLI frameworks like Cobra provide this pattern along with additional features like argument parsing, help generation, and command hierarchy. This allows developers to focus on command logic rather than infrastructure concerns.<\/p>\n\n<h3>The Problem It Solves Here<\/h3>\n\n<p>The SDLC tool needs to support multiple subcommands (run, test, build, etc.) with consistent behavior, argument handling, and error management. Manually parsing command-line arguments and managing subcommand logic would result in complex, hard-to-maintain code. The framework provides structure and reduces boilerplate.<\/p>\n\n<h3>The Implementation<\/h3>\n\n<p class=\"code-file\">📄 <code>main.go:6-12<\/code><\/p>\n\n<pre><code class=\"language-go\">func main() {\n\tcmd.Execute()\n}<\/code><\/p>\n\n<p>This minimal main function demonstrates proper application bootstrapping. All business logic is delegated to the <code>cmd<\/code> package, which follows the dependency inversion principle. The main package remains thin, making testing and modification easier.<\/p>\n\n<p class=\"code-file\">📄 <code>cmd/root.go:13-31<\/code><\/p>\n\n<pre><code class=\"language-go\">// Execute adds all child commands to the root command and sets flags appropriately.\n// This is called by main.main(). It only needs to happen once to the rootCmd.\nfunc Execute() error {\n\trootCmd := &cobra.Command{Use: \"sdlc\"}\n\n\t// Add subcommands\n\trootCmd.AddCommand(\n\t\tNewRunCommand(),\n\t\tNewTestCommand(),\n\t\tNewBuildCommand(),\n\t\tNewInstallCommand(),\n\t\tNewCleanCommand(),\n\t)\n\n\t// Resolve working directory before executing\n\tworkDir, err := resolveWorkDir()\n\tif err != nil {\n\t\treturn err\n\t}\n\n\treturn rootCmd.ExecuteContext(context.Background())\n}<\/code><\/p>\n\n<p>This demonstrates the Composite Pattern where individual commands are composed into a tree structure. The Cobra framework handles command routing, argument parsing, and execution flow. The working directory resolution happens before command execution, ensuring all commands operate in the correct context.<\/p>\n\n<h3>Further Reading<\/h3>\n\n<ul>\n<li><a href=\"https://en.wikipedia.org/wiki/Command<em>pattern\">Command pattern<\/a> — Behavioral design pattern explanation<\/li>\n<li><a href=\"https://pkg.go.dev/github.com/spf13/cobra\">Go Cobra framework<\/a> — Official documentation for the CLI framework used<\/li>\n<li><a href=\"https://en.wikipedia.org/wiki/Command-line<\/em>interface\">Command-line interface<\/a> — General CLI concepts and history<\/li>\n<\/ul>\n\n<h2>Task Abstraction & Command Mapping<\/h2>\n\n<h3>The Concept<\/h3>\n\n<p>Task abstraction involves creating a technology-agnostic interface that can map to different underlying implementations. In this case, the <code>Task<\/code> struct provides a consistent interface for development operations (run, test, build, install, clean) while the actual commands vary by technology stack.<\/p>\n\n<p>This pattern enables polymorphism — the same interface can behave differently based on the underlying technology. It embodies the Open/Closed Principle: the system is open for extension (adding new technologies) but closed for modification (existing code doesn't change when adding support for new project types).<\/p>\n\n<h3>The Problem It Solves Here<\/h3>\n\n<p>Different technologies use different commands for the same operations. A Go project uses <code>go run<\/code> and <code>go test<\/code>, while a Node.js project uses <code>npm run<\/code> with different scripts. The tool needs to abstract these differences so users can run consistent commands regardless of underlying technology.<\/p>\n\n<h3>The Implementation<\/h3>\n\n<p class=\"code-file\">📄 <code>lib/task.go:9-18<\/code><\/p>\n\n<pre><code class=\"language-go\">// Task represents the set of lifecycle commands associated with a specific\n// project type. Each field maps to a shell command that performs the\n// corresponding action (run, test, or build).\ntype Task struct {\n\tRun     string <code>json:\"run\"<\/code>\n\tTest    string <code>json:\"test\"<\/code>\n\tBuild   string <code>json:\"build\"<\/code>\n\tInstall string <code>json:\"install\"<\/code>\n\tClean   string <code>json:\"clean\"<\/code>\n}<\/code><\/pre>\n\n<p>The <code>Task<\/code> struct demonstrates several key design principles:<\/p>\n\n<p><strong>Uniform interface:<\/strong> All project types provide the same operations, creating consistency for users and the tool.<\/p>\n\n<p><strong>String-based commands:<\/strong> Using strings for commands provides maximum flexibility, allowing complex command compositions, pipes, and shell features.<\/p>\n\n<p><strong>JSON struct tags:<\/strong> The JSON tags enable configuration file loading, allowing users to customize commands per project.<\/p>\n\n<p><strong>Zero-value usability:<\/strong> An empty Task struct is valid, enabling the tool to work even without explicit task definitions.<\/p>\n\n<h3>Further Reading<\/h3>\n\n<ul>\n<li><a href=\"https://en.wikipedia.org/wiki/Abstraction<em>(computer<\/em>science)\">Abstraction in computer science<\/a> — Fundamental concept of hiding implementation details<\/li>\n<li><a href=\"https://en.wikipedia.org/wiki/Polymorphism<em>(computer<\/em>science)\">Polymorphism<\/a> — Object-oriented concept of single interface, multiple implementations<\/li>\n<li><a href=\"https://en.wikipedia.org/wiki/Open%E2%80%93closed_principle\">Open/closed principle<\/a> — SOLID principle for extensible design<\/li>\n<\/ul>\n\n<h2>Data Flow Walkthrough<\/h2>\n\n<p>Let's trace a complete operation: running tests in a Go project<\/p>\n\n<ol>\n<li><strong>User executes:<\/strong> <code>sdlc test<\/code> in terminal<\/li>\n\n<li><strong>Entry point (main.go:7):<\/strong> <code>main()<\/code> calls <code>cmd.Execute()<\/code><\/li>\n\n<li><strong>Command initialization (cmd/root.go:17):<\/strong> <code>Execute()<\/code> creates root command and adds <code>NewTestCommand()<\/code> as subcommand<\/li>\n\n<li><strong>Command execution:<\/strong> Cobra routes to the test command's <code>RunE<\/code> function<\/li>\n\n<li><strong>Working directory resolution (cmd/root.go:45):<\/strong> <code>resolveWorkDir()<\/code> determines the current directory for project detection<\/li>\n\n<li><strong>Project detection (engine/engine.go:23):<\/strong> <code>DetectProjects()<\/code> walks the filesystem looking for <code>go.mod<\/code>, <code>package.json<\/code>, or <code>Cargo.toml<\/code><\/li>\n\n<li><strong>Task mapping:<\/strong> When <code>go.mod<\/code> is found, <code>lib.GetTaskForFile(\"go.mod\")<\/code> returns a Task with <code>Test: \"go test\"<\/code><\/li>\n\n<li><strong>Command execution (cmd/executor.go:15):<\/strong> <code>runCommand()<\/code> creates an <code>Executor<\/code> with the task's test command<\/li>\n\n<li><strong>Process spawning (lib/executor.go:32):<\/strong> <code>NewExecutor()<\/code> creates <code>exec.Command(\"sh\", \"-c\", \"go test\")<\/code><\/li>\n\n<li><strong>I/O setup:<\/strong> The command's stdout/stderr are connected to the terminal, stdin from the terminal<\/li>\n\n<li><strong>Process execution (lib/executor.go:41):<\/strong> <code>executor.Run(ctx)<\/code> spawns the process and waits for completion<\/li>\n\n<li><strong>Output streaming:<\/strong> As <code>go test<\/code> runs, output flows through the executor's writers to the terminal in real-time<\/li>\n\n<li><strong>Signal handling:<\/strong> If user presses Ctrl+C, the context is cancelled and the process group is killed<\/li>\n\n<li><strong>Result return:<\/strong> Test results and any errors are returned up the call chain to the user's terminal<\/li>\n<\/ol>\n\n<h2>Design Decisions & Trade-offs<\/h2>\n\n<ul>\n<li><strong>Configuration format choice<\/strong> — The system uses simple key-value files instead of JSON or YAML. Decision: simplicity and human-editability over complex validation. Trade-off: less structure but easier manual editing.<\/li>\n\n<li><strong>Shell command execution vs direct process spawning<\/strong> — Commands are executed through <code>sh -c<\/code> rather than directly calling executables. Decision: enables shell features (pipes, redirects, variable expansion) at the cost of platform dependency. Trade-off: more powerful but less portable.<\/li>\n\n<li><strong>Project detection strategy<\/strong> — Uses filepath.Walk to traverse entire directory trees. Decision: comprehensive detection over performance. Trade-off: finds all projects but may be slow on large directories.<\/li>\n\n<li><strong>Error handling approach<\/strong> — Functions return errors rather than panicking. Decision: graceful degradation over hard failures. Trade-off: more complex error handling but better user experience.<\/li>\n\n<li><strong>Context-based cancellation<\/strong> — Uses context.Context for process cancellation. Decision: standard Go patterns over manual signal handling. Trade-off: follows best practices but requires Go 1.7+.<\/li>\n<\/ul>\n\n<h2>Key Principles to Take Away<\/h2>\n\n<ul>\n<li><strong>Separation of Configuration and Code:<\/strong> Environment-specific settings should be externalized and configurable without code changes, following the Twelve-Factor App methodology.<\/li>\n\n<li><strong>Graceful Process Management:<\/strong> Long-running operations should provide real-time feedback, handle signals properly, and clean up child processes to prevent orphans.<\/li>\n\n<li><strong>Interface-Based Abstraction:<\/strong> Define consistent interfaces for different implementations, enabling polymorphism and making systems extensible without modification.<\/li>\n\n<li><strong>Composite Command Architecture:<\/strong> Complex CLI applications benefit from structured command hierarchies that delegate specific responsibilities to specialized components.<\/li>\n\n<li><strong>Resource Management:<\/strong> Always use proper cleanup patterns (defer statements, context cancellation) to prevent resource leaks in long-running or recursive operations.<\/li>\n<\/ul>\n\n<h2>Next Steps & Exercises<\/h2>\n\n<h3>Exercises<\/h3>\n\n<ul>\n<li><strong>Add project type detection:<\/strong> Extend the project detection in <code>engine/engine.go:27<\/code> to recognize Python projects by looking for <code>requirements.txt<\/code> or <code>pyproject.toml<\/code> files. Implement the corresponding task mapping in <code>lib/task.go<\/code>.<\/li>\n\n<li><strong>Implement configuration file support:<\/strong> Complete the <code>LoadEnvConfig()<\/code> function in <code>config/config.go:30<\/code> by adding the parsing logic for the <code>.sdlc.conf<\/code> file format. Currently it only opens the file but doesn't parse its contents.<\/li>\n\n<li><strong>Add command timeout:<\/strong> Modify the <code>Run()<\/code> method in <code>lib/executor.go:41<\/code> to accept a timeout duration and return an error if the command exceeds that duration.<\/li>\n\n<li><strong>Implement parallel project detection:<\/strong> Replace the sequential <code>filepath.Walk<\/code> in <code>engine/engine.go:23<\/code> with a parallel version using goroutines to improve performance on large directory trees.<\/li>\n\n<li><strong>Add command history:<\/strong> Create a new package <code>history<\/code> that logs executed commands with timestamps and working directories. Integrate it into the executor to provide a <code>sdlc history<\/code> command.<\/li>\n<\/ul>\n\n<h3>What to Read Next<\/h3>\n\n<ul>\n<li><a href=\"https://pkg.go.dev/golang.org/x/sync/errgroup\">Go errgroup package<\/a> — Learn patterns for managing multiple concurrent operations with proper error handling<\/li>\n<li><a href=\"https://pkg.go.dev/io\">Go io package<\/a> — Understand interfaces for I/O operations that enable flexible stream handling<\/li>\n<li><a href=\"https://pkg.go.io/time\">Go time package<\/a> — Explore time-based operations including timeouts and duration handling<\/li>\n<li><a href=\"https://pkg.go.dev/log\">Go log package<\/a> — Learn structured logging patterns for CLI applications<\/li>\n<li><a href=\"https://pkg.go.dev/testing\">Go testing package<\/a> — Master testing patterns for CLI tools and process execution code<\/li>\n<\/ul>\n\n<h3>Ideas to Build<\/h3>\n\n<ul>\n<li><strong>Remote project execution:<\/strong> Extend the executor to support running commands on remote servers via SSH, maintaining the same Task interface but adding connection management and authentication.<\/li>\n\n<li><strong>Build artifact caching:<\/strong> Implement a caching layer that stores build outputs and checks file modification times to avoid unnecessary rebuilds, demonstrating memoization patterns.<\/li>\n\n<li><strong>Plugin architecture:<\/strong> Create a plugin system that allows third-party developers to add new project types or custom task mappings without modifying the core codebase, showcasing extension points and dependency injection.<\/li>\n<\/ul>";})();</script>

    <script>(function(){document.getElementById("article-docs").innerHTML="<h1>API Reference — unitz007/sdlc<\/h1>\n<p>unitz007/sdlc is a Go-based CLI tool that provides a unified interface for managing software development lifecycle commands (run, test, build) across different project types through project detection and command execution.<\/p>\n\n<h2>main<\/h2>\n\n<h3>func main<\/h3>\n<p>Entry point that initializes and executes the SDLC command interface.<\/p>\n<ul>\n<li>return value: no return value (void function)<\/li>\n<\/ul>\n<pre><code class=\"language-go\">func main() {\n    cmd.Execute()\n}<\/code><\/pre>\n\n<h2>cmd<\/h2>\n\n<h3>func Execute<\/h3>\n<p>Adds all child commands to the root command and sets flags appropriately. This is called by main.main() and only needs to happen once.<\/p>\n<ul>\n<li>return value: error - returns error if command execution fails<\/li>\n<\/ul>\n<pre><code class=\"language-go\">func Execute() {\n    if err := RootCmd.Execute(); err != nil {\n        fmt.Println(err)\n        os.Exit(1)\n    }\n}<\/code><\/pre>\n<blockquote>Note: This function will terminate the program with os.Exit(1) if command execution fails.<\/blockquote>\n\n<h3>func runCommand<\/h3>\n<p>Executes shell commands using the context and streams output.<\/p>\n<ul>\n<li>parameters: context - provides cancellation and deadline control<\/li>\n<\/ul>\n\n<h2>config<\/h2>\n\n<h3>func LoadEnvConfig<\/h3>\n<p>Loads configuration from environment variables.<\/p>\n\n<h3>func Load<\/h3>\n<p>Loads configuration from files and environment.<\/p>\n\n<h3>func LoadLocal<\/h3>\n<p>Loads configuration from local files.<\/p>\n\n<h3>func getConfigFile<\/h3>\n<p>Retrieves the path to the configuration file.<\/p>\n\n<h3>type EnvSettings<\/h3>\n<p>Represents the configuration loaded from .sdlc.conf with environment variables and arguments.<\/p>\n<ul>\n<li>Env: map[string]string - environment variables configuration<\/li>\n<li>Args: []string - command arguments<\/li>\n<\/ul>\n\n<h2>engine<\/h2>\n\n<h3>func DetectProjects<\/h3>\n<p>Scans the filesystem to detect projects and their task definitions.<\/p>\n\n<h3>type Project<\/h3>\n<p>Represents a detected project with its location and task definition.<\/p>\n<ul>\n<li>Name: string - Name of the build file (e.g. go.mod)<\/li>\n<li>Path: string - Relative path to the directory containing the build file<\/li>\n<li>AbsPath: string - Absolute path to the directory<\/li>\n<li>Task: lib.Task - The task definition<\/li>\n<\/ul>\n\n<h2>lib<\/h2>\n\n<h3>type Task<\/h3>\n<p>Represents the set of lifecycle commands associated with a specific project type. Each field maps to a shell command that performs the corresponding action.<\/p>\n<ul>\n<li>Run: string - Command to run the project<\/li>\n<li>Test: string - Command to test the project<\/li>\n<li>Build: string - Command to build the project<\/li>\n<li>Install: string - Command to install dependencies<\/li>\n<li>Clean: string - Command to clean build artifacts<\/li>\n<\/ul>\n\n<h3>func Task.Command<\/h3>\n<p>Retrieves the command string for a specified task type.<\/p>\n<ul>\n<li>parameters: cmd - string specifying the task type (run, test, build, install, clean)<\/li>\n<li>return value: string - the command string to execute<\/li>\n<\/ul>\n<pre><code class=\"language-go\">task := Task{\n    Run:   \"go run main.go\",\n    Test:  \"go test ./...\",\n    Build: \"go build -o myapp\",\n}\n\ncmd := task.Command(\"test\")<\/code><\/pre>\n<blockquote>Note: Returns an error if the specified command type is not defined in the Task.<\/blockquote>\n\n<h3>type Executor<\/h3>\n<p>Wraps an os/exec.Cmd to run shell commands, stream output, and handle OS signals gracefully.<\/p>\n\n<h3>func NewExecutor<\/h3>\n<p>Creates a new Executor instance for running shell commands.<\/p>\n<ul>\n<li>return value: *Executor - pointer to the new Executor instance<\/li>\n<\/ul>\n\n<h3>func Executor.SetDir<\/h3>\n<p>Sets the working directory for command execution.<\/p>\n<ul>\n<li>parameters: dir - string specifying the working directory path<\/li>\n<\/ul>\n\n<h3>func Executor.SetEnv<\/h3>\n<p>Sets environment variables for the command.<\/p>\n<ul>\n<li>parameters: env - map of environment variable names to their values<\/li>\n<\/ul>\n\n<h3>func Executor.SetOutput<\/h3>\n<p>Sets the output writers for stdout and stderr.<\/p>\n<ul>\n<li>parameters: \n  <ul>\n  <li>writer - io.Writer for command output<\/li>\n  <\/ul>\n<\/li>\n<\/ul>\n\n<h3>func Executor.Execute<\/h3>\n<p>Executes the command with context cancellation and signal handling.<\/p>\n<ul>\n<li>parameters: ctx - context for cancellation and timeouts<\/li>\n<li>return value: error - returns error if command execution fails<\/li>\n<\/ul>\n<pre><code class=\"language-go\">executor := NewExecutor()\nexecutor.SetDir(\"/path/to/project\")\nexecutor.SetOutput(os.Stdout)\n\nctx := context.Background()\nerr := executor.Execute(ctx)<\/code><\/pre>\n<blockquote>Note: Handles SIGINT and SIGTERM signals gracefully, allowing for clean shutdown of running commands.<\/blockquote>";})();</script>
